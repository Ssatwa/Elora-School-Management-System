{% extends "layouts/app.html" %}
{% block title %}Correct Attendance | Elora{% endblock %}
{% block content %}
<div class="mx-auto max-w-2xl rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
  <p class="text-sm font-semibold uppercase tracking-[0.18em] text-blue-600">Audited correction</p>
  <h1 class="mt-1 text-2xl font-bold">Correct attendance entry</h1>
  <p class="mt-2 text-slate-600">{{ entry }}</p>
  <form method="post" class="mt-6 space-y-4">{% csrf_token %}{{ form.as_p }}<button class="rounded-xl bg-blue-600 px-5 py-3 font-semibold text-white">Record correction</button></form>
</div>
{% endblock %}
