{% if messages %}
  <div class="mb-6 space-y-2">
    {% for message in messages %}
      <div
        class="rounded-xl border px-4 py-3 text-sm font-medium {% if message.tags == 'error' %}border-rose-200 bg-rose-50 text-rose-900{% elif message.tags == 'warning' %}border-amber-200 bg-amber-50 text-amber-900{% elif message.tags == 'success' %}border-emerald-200 bg-emerald-50 text-emerald-900{% else %}border-blue-200 bg-blue-50 text-blue-900{% endif %}"
        {% if message.tags == "error" %}role="alert"{% else %}role="status"{% endif %}
      >
        {{ message }}
      </div>
    {% endfor %}
  </div>
{% endif %}
