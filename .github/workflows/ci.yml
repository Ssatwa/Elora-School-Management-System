name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: elora_test
          POSTGRES_USER: elora
          POSTGRES_PASSWORD: elora
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgres://elora:elora@127.0.0.1:5432/elora_test
      SECRET_KEY: ci-only-secret-key-with-more-than-fifty-unique-characters-2026

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: npm ci
      - run: npm run css:build
      - run: ruff check .
      - run: mypy apps config
      - run: python manage.py makemigrations --check
      - run: coverage run -m pytest
      - run: coverage report --fail-under=85
      - run: pip-audit
      - name: Django deployment checks
        env:
          DJANGO_SETTINGS_MODULE: config.settings.production
          ALLOWED_HOSTS: .elora.co.ke
        run: python manage.py check --deploy
