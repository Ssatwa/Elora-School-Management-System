<header class="sticky top-0 z-30 flex h-20 items-center gap-3 border-b px-4 backdrop-blur-xl sm:px-6" style="border-color: var(--elora-border); background-color: color-mix(in srgb, var(--elora-surface) 92%, transparent);">
  <button
    type="button"
    class="grid size-10 shrink-0 place-items-center rounded-xl border lg:hidden"
    style="border-color: var(--elora-border);"
    @click="sidebarOpen = true"
    :aria-expanded="sidebarOpen"
    aria-controls="primary-navigation"
    aria-label="Open navigation"
  >
    <svg class="size-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path stroke-linecap="round" d="M4 7h16M4 12h16M4 17h16"/></svg>
  </button>

  <div class="hidden min-w-0 sm:block">
    <p class="truncate text-sm font-semibold">{{ request.school.name|default:"Elora Platform" }}</p>
    <p class="truncate text-xs" style="color: var(--elora-muted);">School workspace</p>
  </div>

  <div class="mx-auto hidden w-full max-w-xl md:block">
    <label class="relative block">
      <span class="sr-only">Search Elora</span>
      <svg class="pointer-events-none absolute left-3.5 top-1/2 size-4 -translate-y-1/2" style="color: var(--elora-muted);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="m16 16 4 4"/></svg>
      <input
        type="search"
        aria-label="Search Elora"
        placeholder="Search learners, staff, records..."
        class="h-10 rounded-xl pl-10 text-sm shadow-none"
      >
    </label>
  </div>

  <div class="ml-auto flex items-center gap-1.5">
    <button type="button" class="elora-icon-button md:hidden" aria-label="Search Elora">
      <svg class="size-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="m16 16 4 4"/></svg>
    </button>
    <button
      type="button"
      data-theme-toggle
      class="elora-icon-button"
      @click="toggleTheme()"
      :aria-pressed="theme === 'dark'"
      :aria-label="theme === 'dark' ? 'Use light mode' : 'Use dark mode'"
    >
      <svg x-show="theme === 'light'" class="size-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path stroke-linecap="round" d="M12 3V1m0 22v-2M3 12H1m22 0h-2M4.2 4.2 2.8 2.8m18.4 18.4-1.4-1.4m0-15.6 1.4-1.4M2.8 21.2l1.4-1.4"/><circle cx="12" cy="12" r="4"/></svg>
      <svg x-cloak x-show="theme === 'dark'" class="size-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M20 15.5A8.5 8.5 0 0 1 8.5 4 8.5 8.5 0 1 0 20 15.5Z"/></svg>
    </button>
    <button type="button" class="elora-icon-button relative" aria-label="Notifications">
      <svg class="size-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9a6 6 0 0 1 12 0v4l2 3H4l2-3V9Zm4 10h4"/></svg>
      <span class="absolute right-2 top-2 size-2 rounded-full bg-rose-500 ring-2" style="--tw-ring-color: var(--elora-surface);"></span>
    </button>

    <div class="relative" x-data="{ profileOpen: false }">
      <button
        type="button"
        class="ml-1 flex items-center gap-2 rounded-xl p-1.5 pr-2 text-left hover:bg-slate-500/10"
        @click="profileOpen = !profileOpen"
        @keydown.escape.window="profileOpen = false"
        :aria-expanded="profileOpen"
        aria-haspopup="menu"
        aria-label="User menu"
      >
        <span class="grid size-8 place-items-center rounded-lg bg-blue-600 text-xs font-bold text-white">{{ request.user.email|slice:":1"|upper }}</span>
        <span class="hidden max-w-36 lg:block">
          <span class="block truncate text-xs font-semibold">{{ request.user.get_full_name|default:request.user.email }}</span>
          <span class="block truncate text-[10px]" style="color: var(--elora-muted);">{{ request.user.email }}</span>
        </span>
        <svg class="hidden size-4 lg:block" style="color: var(--elora-muted);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path stroke-linecap="round" d="m7 10 5 5 5-5"/></svg>
      </button>
      <div
        x-cloak
        x-show="profileOpen"
        x-transition.origin.top.right
        @click.outside="profileOpen = false"
        class="absolute right-0 mt-2 w-56 rounded-xl border p-2 shadow-xl"
        style="border-color: var(--elora-border); background-color: var(--elora-surface);"
        role="menu"
      >
        <div class="border-b px-3 py-2" style="border-color: var(--elora-border);">
          <p class="truncate text-sm font-semibold">{{ request.user.email }}</p>
          <p class="text-xs" style="color: var(--elora-muted);">{{ request.school.name|default:"Elora Platform" }}</p>
        </div>
        <a href="{% url 'accounts:select_school' %}" class="mt-1 block rounded-lg px-3 py-2 text-sm font-medium hover:bg-slate-500/10" role="menuitem">Switch school</a>
        <form method="post" action="{% url 'accounts:logout' %}" class="mt-1">
          {% csrf_token %}
          <button type="submit" class="w-full rounded-lg px-3 py-2 text-left text-sm font-medium hover:bg-slate-500/10" role="menuitem">Sign out</button>
        </form>
      </div>
    </div>
  </div>
</header>
