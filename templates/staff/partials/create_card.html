<article class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
  <h2 class="font-semibold text-slate-950">{{ title }}</h2>
  <form class="mt-4 space-y-3" method="post" action="{% url 'staff:create' model_name=model_name %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="rounded-xl bg-blue-700 px-4 py-2 text-sm font-semibold text-white" type="submit">
      Add {{ title|lower }}
    </button>
  </form>
</article>
