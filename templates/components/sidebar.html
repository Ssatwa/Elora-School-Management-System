<aside
  data-elora-sidebar
  class="border-r border-slate-200 bg-slate-950 text-white"
  :class="sidebarOpen ? 'block' : 'hidden lg:block'"
>
  <div class="flex h-20 items-center gap-3 border-b border-white/10 px-6">
    <span class="grid size-10 place-items-center rounded-xl bg-blue-600 font-bold">E</span>
    <div>
      <p class="font-semibold">Elora</p>
      <p class="text-xs text-slate-400">Powering Modern Education</p>
    </div>
  </div>
  <nav aria-label="Primary" class="space-y-1 p-4">
    <a class="block rounded-xl bg-white/10 px-4 py-3 font-medium" href="/dashboard/">
      Dashboard
    </a>
    {% if can_manage_academics %}
      <a class="block rounded-xl px-4 py-3 font-medium text-slate-300 hover:bg-white/10 hover:text-white" href="/academics/">
        Academic structure
      </a>
    {% endif %}
    {% if can_manage_staff %}
      <a class="block rounded-xl px-4 py-3 font-medium text-slate-300 hover:bg-white/10 hover:text-white" href="/staff/">
        Staff
      </a>
    {% endif %}
    {% if can_view_learners %}
      <a class="block rounded-xl px-4 py-3 font-medium text-slate-300 hover:bg-white/10 hover:text-white" href="/learners/">
        Learners
      </a>
    {% endif %}
  </nav>
</aside>
