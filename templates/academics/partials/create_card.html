<article class="elora-form-section">
  <h2 class="font-semibold">{{ title }}</h2>
  <form class="mt-4 space-y-3" method="post" action="{% url 'academics:create' model_name=model_name %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="elora-button-primary" type="submit">
      Add {{ title|lower }}
    </button>
  </form>
</article>
